<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل الفيديو</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .video-container {
            width: 80%;
            max-width: 800px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <h1>مشغل الفيديو الخاص بي</h1>

    <div class="video-container">
        <!-- استبدل "video.mp4" باسم ملف الفيديو بتاعك المرفوع على جيت هوب -->
        <video controls autoplay muted>
            <source src="video.mp4" type="video/mp4">
            المتصفح الخاص بك لا يدعم تشغيل هذا الفيديو.
        </video>
    </div>

</body>
</html>
